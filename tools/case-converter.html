<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>محول حالة النص | أدواتي</title>
  <meta name="description" content="حوّل النص إلى أحرف كبيرة أو صغيرة أو حالة العنوان أو الجملة مجاناً وفوراً." />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="../index.html" class="logo">🛠️ أدواتي</a>
      <nav><a href="../index.html">الرئيسية</a></nav>
    </div>
  </header>

  <div class="ad-slot container"><span class="ad-label">مساحة إعلانية</span></div>

  <main class="container tool-page">
    <a href="../index.html" class="back-link">← رجوع للأدوات</a>
    <h1>🔤 محول حالة النص</h1>
    <p class="desc">حوّل النص بين حالات الأحرف المختلفة.</p>

    <div class="panel">
      <textarea id="text" placeholder="اكتب النص هنا..."></textarea>
      <div class="row">
        <button class="btn" onclick="convert('upper')">UPPERCASE</button>
        <button class="btn" onclick="convert('lower')">lowercase</button>
        <button class="btn" onclick="convert('title')">Title Case</button>
        <button class="btn" onclick="convert('sentence')">Sentence case</button>
        <button class="btn btn-secondary" onclick="copyText()">نسخ</button>
      </div>
    </div>
  </main>

  <div class="ad-slot container"><span class="ad-label">مساحة إعلانية</span></div>

  <footer class="site-footer"><div class="container"><p>© <span id="year"></span> أدواتي</p></div></footer>

  <script src="../js/main.js"></script>
  <script>
    function convert(mode) {
      var el = document.getElementById("text");
      var t = el.value;
      if (mode === "upper") el.value = t.toUpperCase();
      else if (mode === "lower") el.value = t.toLowerCase();
      else if (mode === "title") el.value = t.toLowerCase().replace(/\b\w/g, function (c) { return c.toUpperCase(); });
      else if (mode === "sentence") el.value = t.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w)/g, function (c) { return c.toUpperCase(); });
    }
    function copyText() {
      navigator.clipboard.writeText(document.getElementById("text").value).then(function () { alert("تم النسخ!"); });
    }
  </script>
</body>
</html>
