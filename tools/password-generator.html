<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مولد كلمات المرور القوية | أدواتي</title>
  <meta name="description" content="مولد كلمات مرور مجاني وقوي. أنشئ كلمات مرور عشوائية آمنة مع أحرف وأرقام ورموز بضغطة زر." />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="../index.html" class="logo">🛠️ أدواتي</a>
      <nav><a href="../index.html">الرئيسية</a></nav>
    </div>
  </header>

  <!-- Adsterra: بانر أعلى -->
  <div class="ad-slot container"><span class="ad-label">مساحة إعلانية</span></div>

  <main class="container tool-page">
    <a href="../index.html" class="back-link">← رجوع للأدوات</a>
    <h1>🔐 مولد كلمات المرور</h1>
    <p class="desc">أنشئ كلمات مرور قوية وآمنة تعمل محلياً في متصفحك.</p>

    <div class="panel">
      <label>الطول: <span id="lenLabel">16</span></label>
      <input type="range" id="length" min="4" max="64" value="16" style="width:100%" />

      <div class="checkbox-row"><input type="checkbox" id="upper" checked /><label for="upper" style="margin:0">أحرف كبيرة (A-Z)</label></div>
      <div class="checkbox-row"><input type="checkbox" id="lower" checked /><label for="lower" style="margin:0">أحرف صغيرة (a-z)</label></div>
      <div class="checkbox-row"><input type="checkbox" id="numbers" checked /><label for="numbers" style="margin:0">أرقام (0-9)</label></div>
      <div class="checkbox-row"><input type="checkbox" id="symbols" checked /><label for="symbols" style="margin:0">رموز (!@#$%)</label></div>

      <div class="row">
        <button class="btn" onclick="generate()">توليد</button>
        <button class="btn btn-secondary" onclick="copyPass()">نسخ</button>
      </div>

      <div class="result" id="output">اضغط "توليد" لإنشاء كلمة مرور</div>
    </div>
  </main>

  <!-- Adsterra: بانر أسفل -->
  <div class="ad-slot container"><span class="ad-label">مساحة إعلانية</span></div>

  <footer class="site-footer"><div class="container"><p>© <span id="year"></span> أدواتي</p></div></footer>

  <script src="../js/main.js"></script>
  <script>
    var lenInput = document.getElementById("length");
    lenInput.addEventListener("input", function () {
      document.getElementById("lenLabel").textContent = lenInput.value;
    });
    function generate() {
      var sets = "";
      if (document.getElementById("upper").checked) sets += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      if (document.getElementById("lower").checked) sets += "abcdefghijklmnopqrstuvwxyz";
      if (document.getElementById("numbers").checked) sets += "0123456789";
      if (document.getElementById("symbols").checked) sets += "!@#$%^&*()-_=+[]{};:,.?";
      if (!sets) { document.getElementById("output").textContent = "اختر نوعاً واحداً على الأقل"; return; }
      var len = parseInt(lenInput.value, 10);
      var arr = new Uint32Array(len);
      crypto.getRandomValues(arr);
      var pass = "";
      for (var i = 0; i < len; i++) pass += sets[arr[i] % sets.length];
      document.getElementById("output").textContent = pass;
    }
    function copyPass() {
      var t = document.getElementById("output").textContent;
      navigator.clipboard.writeText(t).then(function () { alert("تم النسخ!"); });
    }
    generate();
  </script>
</body>
</html>
