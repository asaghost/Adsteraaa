<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عداد الكلمات والحروف | أدواتي</title>
  <meta name="description" content="أداة مجانية لعد الكلمات والحروف والجمل والفقرات في أي نص فوراً وبدون تسجيل." />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="../index.html" class="logo">🛠️ أدواتي</a>
      <nav><a href="../index.html">الرئيسية</a></nav>
    </div>
  </header>

  <div class="ad-slot container"><span class="ad-label">مساحة إعلانية</span></div>

  <main class="container tool-page">
    <a href="../index.html" class="back-link">← رجوع للأدوات</a>
    <h1>📝 عداد الكلمات والحروف</h1>
    <p class="desc">اكتب أو الصق النص وشاهد الإحصائيات فوراً.</p>

    <div class="panel">
      <textarea id="text" placeholder="اكتب أو الصق النص هنا..." oninput="count()"></textarea>
      <div class="stats">
        <div class="stat-box"><div class="num" id="words">0</div><div class="lbl">كلمة</div></div>
        <div class="stat-box"><div class="num" id="chars">0</div><div class="lbl">حرف</div></div>
        <div class="stat-box"><div class="num" id="charsNoSpace">0</div><div class="lbl">حرف بدون مسافات</div></div>
        <div class="stat-box"><div class="num" id="sentences">0</div><div class="lbl">جملة</div></div>
        <div class="stat-box"><div class="num" id="paragraphs">0</div><div class="lbl">فقرة</div></div>
      </div>
    </div>
  </main>

  <div class="ad-slot container"><span class="ad-label">مساحة إعلانية</span></div>

  <footer class="site-footer"><div class="container"><p>© <span id="year"></span> أدواتي</p></div></footer>

  <script src="../js/main.js"></script>
  <script>
    function count() {
      var t = document.getElementById("text").value;
      var words = t.trim() ? t.trim().split(/\s+/).length : 0;
      var chars = t.length;
      var charsNoSpace = t.replace(/\s/g, "").length;
      var sentences = (t.match(/[.!?؟।]+/g) || []).length;
      var paragraphs = t.trim() ? t.trim().split(/\n+/).length : 0;
      document.getElementById("words").textContent = words;
      document.getElementById("chars").textContent = chars;
      document.getElementById("charsNoSpace").textContent = charsNoSpace;
      document.getElementById("sentences").textContent = sentences;
      document.getElementById("paragraphs").textContent = paragraphs;
    }
  </script>
</body>
</html>
