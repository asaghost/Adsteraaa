<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>محول الوحدات | أدواتي</title>
  <meta name="description" content="محول وحدات مجاني: الطول، الوزن، ودرجة الحرارة. تحويل فوري ودقيق." />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="../index.html" class="logo">🛠️ أدواتي</a>
      <nav><a href="../index.html">الرئيسية</a></nav>
    </div>
  </header>

  <div class="ad-slot container"><span class="ad-label">مساحة إعلانية</span></div>

  <main class="container tool-page">
    <a href="../index.html" class="back-link">← رجوع للأدوات</a>
    <h1>📏 محول الوحدات</h1>
    <p class="desc">اختر نوع الوحدة وحوّل بين القيم فوراً.</p>

    <div class="panel">
      <label for="category">النوع</label>
      <select id="category" onchange="fillUnits()">
        <option value="length">الطول</option>
        <option value="weight">الوزن</option>
        <option value="temp">درجة الحرارة</option>
      </select>

      <div class="row">
        <div style="flex:1">
          <label>من</label>
          <select id="from" onchange="convert()"></select>
        </div>
        <div style="flex:1">
          <label>إلى</label>
          <select id="to" onchange="convert()"></select>
        </div>
      </div>

      <label for="value">القيمة</label>
      <input type="number" id="value" value="1" oninput="convert()" />

      <div class="result" id="output">النتيجة ستظهر هنا</div>
    </div>
  </main>

  <div class="ad-slot container"><span class="ad-label">مساحة إعلانية</span></div>

  <footer class="site-footer"><div class="container"><p>© <span id="year"></span> أدواتي</p></div></footer>

  <script src="../js/main.js"></script>
  <script>
    var units = {
      length: { "متر": 1, "كيلومتر": 1000, "سنتيمتر": 0.01, "مليمتر": 0.001, "ميل": 1609.34, "قدم": 0.3048, "إنش": 0.0254 },
      weight: { "كيلوجرام": 1, "جرام": 0.001, "طن": 1000, "رطل": 0.453592, "أونصة": 0.0283495 },
      temp: { "مئوية": "C", "فهرنهايت": "F", "كلفن": "K" }
    };
    function fillUnits() {
      var cat = document.getElementById("category").value;
      var from = document.getElementById("from"), to = document.getElementById("to");
      from.innerHTML = ""; to.innerHTML = "";
      var keys = Object.keys(units[cat]);
      keys.forEach(function (k) {
        from.add(new Option(k, k));
        to.add(new Option(k, k));
      });
      to.selectedIndex = 1;
      convert();
    }
    function convert() {
      var cat = document.getElementById("category").value;
      var val = parseFloat(document.getElementById("value").value);
      var from = document.getElementById("from").value, to = document.getElementById("to").value;
      if (isNaN(val)) { document.getElementById("output").textContent = "أدخل قيمة صحيحة"; return; }
      var res;
      if (cat === "temp") {
        var c;
        if (from === "مئوية") c = val; else if (from === "فهرنهايت") c = (val - 32) * 5 / 9; else c = val - 273.15;
        if (to === "مئوية") res = c; else if (to === "فهرنهايت") res = c * 9 / 5 + 32; else res = c + 273.15;
      } else {
        res = val * units[cat][from] / units[cat][to];
      }
      document.getElementById("output").textContent = val + " " + from + " = " + (Math.round(res * 100000) / 100000) + " " + to;
    }
    fillUnits();
  </script>
</body>
</html>
